name: Cleanup old caches

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup old caches
        uses: actions/github-script@v7
        with:
          script: |
            const daysToKeep = 7;
            const cutoff = Date.now() - daysToKeep * 24 * 60 * 60 * 1000;
            let deleted = 0;

            for (const repo of await github.paginate(
              github.rest.actions.getCaches,
              { owner: context.repo.owner, repo: context.repo.repo, per_page: 100 }
            )) {
              if (new Date(repo.last_accessed_at).getTime() < cutoff) {
                await github.rest.actions.deleteActionsCacheById({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  cache_id: repo.id,
                });
                console.log(`Deleted cache: ${repo.key} (${repo.size_in_bytes} bytes)`);
                deleted++;
              }
            }

            console.log(`Cleaned up ${deleted} old cache(s)`);
