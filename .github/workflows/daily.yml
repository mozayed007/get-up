name: Daily Run

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust-leetcode-daily
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo builds
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-leetcode-daily/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust-leetcode-daily/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --release --all-features

  run:
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust-leetcode-daily
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo builds
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-leetcode-daily/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust-leetcode-daily/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run binary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          BIRTH_YEAR: ${{ secrets.BIRTH_YEAR }}
          TIMEZONE: ${{ secrets.TIMEZONE }}
          LEETCODE_ENDPOINT: https://leetcode.com/graphql/
          LEETCODE_VARIANT: com
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}
        run: cargo run --release --all-features -- --post --telegram --discord
